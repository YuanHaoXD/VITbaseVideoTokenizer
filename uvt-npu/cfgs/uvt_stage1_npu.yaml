# UVT Stage 1 训练配置 —— NPU 版（华为昇腾 910B2 / CANN 8.2.RC1 / torch_npu 2.6.0.post5）。
# 与 cfgs/uvt_stage1.yaml 的唯一实质差异：compile=false（torch.compile 在 NPU 上经 inductor→triton 链路
# 脆弱，先稳后快；待 ge 后端稳定后再开）。其余字段与原配置一致，设备相关调用由 utils/accel.py 收口。
#
# === 单卡 NPU 冒烟（tiny，无权重下载）===
#   python train.py --cfg cfgs/uvt_stage1_npu.yaml \
#       --csv_file null128 --batch_size 2 --frame_num 17 --input_size 256 --num_workers 2 \
#       --opts compile false model.args.tiny true teachers.tiny true teachers.vid_mock true \
#              max_epoch 1 grad_accumulates 1
#
# === 8 卡 HCCL null 冒烟 ===
#   torchrun --nproc_per_node=8 train.py --cfg cfgs/uvt_stage1_npu.yaml \
#       --csv_file null128 --batch_size 2 --frame_num 17 --input_size 256 --num_workers 4 \
#       --opts compile false model.args.tiny true teachers.tiny true teachers.vid_mock true \
#              max_epoch 1 grad_accumulates 1
#
# === 真实训练（需先下载 SigLIP2 权重，见 07 §2）===
#   torchrun --nproc_per_node=8 train.py --cfg cfgs/uvt_stage1_npu.yaml \
#       --csv_file <imagenet_train.csv> --batch_size 32 --frame_num 17 --input_size 256 \
#       --opts teachers.vid_mock false

trainer: uvt_tokenizer_trainer

stage: 1
lambda_dist: 0.5
clip_grad_max_norm: 0.0
latent_stats_n: 10000
data_version: 'imagenet-v1+openvid-256-v1'
adr_versions: ['ADR-3@(0,6)', "ADR-4'@iso", 'ADR-8@hybrid']
paired_with: []

model:
  name: uvt_tokenizer
  args:
    model_name: '/cache/VITbaseVideoTokenizer/models/siglip2-so400m-patch16-256'  # NPU: 本地路径(HF 不通)
    gen_depth: 13
    c_latent: 64
    fold_positions: [0, 6]
    unfold_positions: [21, 27]
    attn_mode: 'tubelet'
    rope_dims: 32
    decoder_init: 'siglip'
    use_cos_consistency: true
    kl_weight: 1.0e-6
    tiny: false                       # 生产；冒烟用 --opts model.args.tiny true 免下载 SigLIP2
    l1_weight: 1.0
    lpips_weight: 1.0
    cos_weight: 1.0
    distill_img_patch_weight: 1.0
    distill_img_pool_weight: 1.0
    distill_vid_weight: 1.0

distill:
  student_dim: 1152
  teacher_img_dim: 1152
  teacher_vid_dim: 1152

gan:
  disc_loss: 'ns_smooth'
  disc_weight: 0.3
  disc_factor: 1.0
  lecam_weight: 1.0e-3
  lecam_ema_decay: 0.999
  r1_gp_weight: 0.0
  d_update_freq: 5
  disc_start: 0
  dis_lr_multiplier: 1.0
  dis_adam_betas: [0.5, 0.9]

teachers:
  img_id: '/cache/VITbaseVideoTokenizer/models/siglip2-so400m-patch16-256'      # NPU: 本地路径(HF 不通)
  tiny: false
  vid_mock: true
  vid_mock_args: { frames: 16, spatial_tokens: 256, dim: 1152 }
  vid:
    teacher_id: 'OpenGVLab/InternVideo2-Stage2_1B'

# train_dataset 节仅为满足 LARP make_cfg 预处理（train.py:131 strip cls_vid_num）；TR-2 实际用 joint_dataset。
train_dataset:
  name: video_dataset
  args:
    root_path: data/metadata
    split: train
    frame_num: $frame_num$
    rand_augment: 'no'
    csv_file: $csv_file$
    cls_vid_num: '-1_-1'
    crop_size: $input_size$
    scale: 1.0
    aspect_ratio: 1.0
    rand_flip: 'yes'
    use_all_frames: false
    pre_load: false
  loader:
    batch_size: $batch_size$
    num_workers: $num_workers$

joint_dataset:
  seed: 0
  sources:
    - dataset: { name: video_dataset, args: { csv_file: $csv_file$, frame_num: $frame_num$,
                  crop_size: $input_size$, rand_flip: 'yes', root_path: data/metadata,
                  split: train, cls_vid_num: '-1_-1', use_all_frames: false, pre_load: false } }
      batch_size: $batch_size$
      ratio: 3
    - dataset: { name: image_dataset, args: { csv_file: null128, crop_size: $input_size$ } }
      batch_size: $batch_size$
      ratio: 1

test_dataset:
  name: video_dataset
  args: { root_path: data/metadata, frame_num: $frame_num$, cls_vid_num: '-1_-1',
          crop_size: $input_size$, use_all_frames: false, pre_load: false }
  csv_paths: { ucf101_val: '' }
  loader: { batch_size: $batch_size$, num_workers: $num_workers$ }

optimizer:
  name: adamw
  loss_name: adam
  args: { lr: 2.0e-4, betas: [0.9, 0.95], weight_decay: 0.05 }
  loss_args: { lr: 2.0e-4, betas: [0.5, 0.9] }
  lr_type: cosine
  warmup_epoch: 1
  min_lr_mult: 0.05

max_epoch: 400
eval_epoch: 25
vis_epoch: 25
latest_interval: 5
save_epoch: 100000000
save_best: false
stepwise_logging: false
ema_decay: '0.9999_0.999'

# 加速 / 精度（NPU）
use_amp: true
amp_dtype: 'bfloat16'                # 910B2 bf16 原生支持；GradScaler 恒 disabled（bf16 无需 scaling）
compile: false                       # ★ NPU 关键：关 torch.compile（inductor→triton 链路在 NPU 脆弱）
compile_mode: 'default'
flash_attn: false                    # 走 SDPA（torch_npu 支持）
grad_accumulates: 4
